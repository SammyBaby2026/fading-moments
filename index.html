<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fading Moments</title>
    <meta name="description" content="A multilingual archive of essays, photos, stories, and videos">
    <script>
        // Language detection and redirect
        (function() {
            var lang = localStorage.getItem('fm_lang');
            var validLangs = ['en', 'de', 'zh'];
            
            if (lang && validLangs.indexOf(lang) !== -1) {
                window.location.replace('/' + lang + '/');
            } else {
                // Default to English
                window.location.replace('/en/');
            }
        })();
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .loading {
            text-align: center;
        }
        .loading h1 {
            font-weight: 300;
            margin-bottom: 1rem;
        }
        .fallback {
            margin-top: 2rem;
        }
        .fallback a {
            color: #666;
            text-decoration: none;
            margin: 0 1rem;
            padding: 0.5rem 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .fallback a:hover {
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="loading">
        <h1>Fading Moments</h1>
        <p>Loading...</p>
    </div>
    <div class="fallback">
        <a href="/en/">English</a>
        <a href="/de/">Deutsch</a>
        <a href="/zh/">中文</a>
    </div>
</body>
</html>
