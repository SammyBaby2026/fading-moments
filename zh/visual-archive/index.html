    .category-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 28px; text-align: center; transition: all 0.3s ease; box-shadow: 0 12px 26px rgba(0, 0, 0, 0.18); text-decoration: none; color: inherit; }

    .archive-gallery { padding: 60px 24px; border-top: 1px solid rgba(201, 193, 180, 0.3); }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1100px; margin: 0 auto; }
    .gallery-item { aspect-ratio: 4 / 3; overflow: hidden; border: 1px solid var(--border-light); background: var(--bg-card); box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12); transition: all 0.3s ease; }
    .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 16px 36px rgba(0, 0, 0, 0.16); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9) contrast(1.05); transition: all 0.3s ease; }

    .page-nav { padding: 40px 24px 60px; border-top: 1px solid rgba(201, 193, 180, 0.3); }

    .page-nav-btn { display: block; font-family: var(--font-ui); font-size: 14px; padding: 16px 32px; background: #3a4a42; color: var(--text-light); text-decoration: none; border: 1px solid #3a4a42; transition: all 0.3s ease; text-align: center; }
